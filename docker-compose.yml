 

services:

  # ── Aplicación Web ────────────────────────────────────────
  web:
    build: .
    container_name: ceplan_web
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ConnectionStrings__LoginDB=Server=sqlserver,1433;Database=LoginDB;User Id=sa;Password=YourPass123!;TrustServerCertificate=True;
      - AppSettings__MaxIntentosFallidos=4
      - AppSettings__LockoutDurationMinutes=20
      - AppSettings__SessionTimeoutMinutes=20
      - AppSettings__SessionWarningSeconds=60
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: on-failure

  # ── SQL Server 2022 ───────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ceplan_sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourPass123!
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
      - ./Database:/scripts:ro                  # Monta tus .sql aquí (read-only)
      - ./entrypoint-sql.sh:/entrypoint-sql.sh:ro
    entrypoint: ["/bin/bash", "/entrypoint-sql.sh"]  # ← Ejecuta el script personalizado
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost",
             "-U", "sa", "-P", "YourPass123!", "-No", "-Q", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s
    restart: always

volumes:
  sqldata:
    name: ceplan_sqldata